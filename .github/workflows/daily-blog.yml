name: Daily Blog Publish

# 매일 07:00 KST = 22:00 UTC (전날) 에 별자리 운세 발행
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (KST). 비우면 오늘'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 botocore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Generate & publish blog post
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/generate_blog_daily_zodiac.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/generate_blog_daily_zodiac.py
          fi

      - name: Commit regenerated content files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend-next/public/blog-content/
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
            git commit -m "chore(blog): ${DATE_KST} 별자리 운세 자동 발행"
            git push
          fi
